<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评语加载诊断工具 v2</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .log-container {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
            max-height: 600px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #007acc;
            padding-left: 10px;
        }
        .log-success { border-left-color: #4ec9b0; color: #4ec9b0; }
        .log-error { border-left-color: #f48771; color: #f48771; }
        .log-warning { border-left-color: #dcdcaa; color: #dcdcaa; }
        .log-info { border-left-color: #569cd6; color: #569cd6; }
        .timestamp { color: #858585; font-size: 0.9em; }
        .btn {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        .btn:hover { background: #1177bb; }
        .metric {
            display: inline-block;
            background: #2d2d30;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 3px;
            border: 1px solid #3e3e42;
        }
        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4ec9b0;
        }
        .metric-label {
            font-size: 0.9em;
            color: #858585;
        }
    </style>
</head>
<body>
    <h1>🔍 评语加载诊断工具 v2</h1>
    
    <div>
        <button class="btn" onclick="testAPI()">测试 API</button>
        <button class="btn" onclick="testLocalStorage()">测试 localStorage</button>
        <button class="btn" onclick="testDataJS()">测试 data.js</button>
        <button class="btn" onclick="testFullLoad()">完整加载测试</button>
        <button class="btn" onclick="clearCache()">清空缓存</button>
        <button class="btn" onclick="clearLogs()">清空日志</button>
    </div>
    
    <div style="margin: 10px 0; padding: 10px; background: #2d2d30; border-radius: 3px; border: 1px solid #3e3e42;">
        <strong style="color: #dcdcaa;">⚠️ 重要提示：</strong>
        <ul style="margin: 5px 0; padding-left: 20px; color: #d4d4d4;">
            <li>如果看到"未登录"或"被重定向"错误，请先在另一个标签页登录系统</li>
            <li>登录后回到此页面，点击"完整加载测试"</li>
            <li>首次测试会从服务器获取数据并缓存</li>
            <li>再次测试将从缓存读取（秒加载）</li>
        </ul>
    </div>
    
    <h2>性能指标</h2>
    <div id="metrics">
        <div class="metric">
            <div class="metric-label">API响应时间</div>
            <div class="metric-value" id="apiTime">-</div>
        </div>
        <div class="metric">
            <div class="metric-label">localStorage读取</div>
            <div class="metric-value" id="localStorageTime">-</div>
        </div>
        <div class="metric">
            <div class="metric-label">总加载时间</div>
            <div class="metric-value" id="totalTime">-</div>
        </div>
        <div class="metric">
            <div class="metric-label">学生数量</div>
            <div class="metric-value" id="studentCount">-</div>
        </div>
    </div>
    
    <h2>诊断日志</h2>
    <div class="log-container" id="logContainer"></div>
    
    <script>
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            log('日志已清空', 'info');
        }
        
        function clearCache() {
            try {
                localStorage.removeItem('students');
                localStorage.removeItem('comments');
                log('✅ 缓存已清空', 'success');
                log('   - 下次测试将从服务器获取数据', 'info');
                
                // 重置指标
                document.getElementById('studentCount').textContent = '-';
                document.getElementById('localStorageTime').textContent = '-';
            } catch (error) {
                log(`❌ 清空缓存失败: ${error.message}`, 'error');
            }
        }
        
        async function testAPI() {
            log('开始测试 API...', 'info');
            const startTime = performance.now();
            
            try {
                const response = await fetch('/api/students', {
                    credentials: 'include' // 确保发送cookies
                });
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                
                document.getElementById('apiTime').textContent = `${duration}ms`;
                
                // 检查是否被重定向到登录页
                if (response.redirected) {
                    log(`❌ API被重定向到: ${response.url}`, 'error');
                    log(`   - 可能原因: 未登录或session过期`, 'error');
                    log(`   - 解决方法: 请先登录系统`, 'warning');
                    return;
                }
                
                if (!response.ok) {
                    log(`❌ API响应错误: ${response.status} ${response.statusText}`, 'error');
                    
                    // 尝试读取响应内容
                    const text = await response.text();
                    if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                        log(`   - 返回的是HTML页面，不是JSON数据`, 'error');
                        log(`   - 可能是登录页面或错误页面`, 'error');
                    }
                    return;
                }
                
                // 先获取文本，检查是否是JSON
                const text = await response.text();
                
                if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                    log(`❌ API返回HTML而不是JSON`, 'error');
                    log(`   - 可能原因: 未登录或session过期`, 'error');
                    log(`   - 返回内容预览: ${text.substring(0, 100)}...`, 'error');
                    return;
                }
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseError) {
                    log(`❌ JSON解析失败: ${parseError.message}`, 'error');
                    log(`   - 返回内容: ${text.substring(0, 200)}`, 'error');
                    return;
                }
                
                if (data.error) {
                    log(`❌ API返回错误: ${data.error}`, 'error');
                    return;
                }
                
                const students = data.students || [];
                document.getElementById('studentCount').textContent = students.length;
                
                log(`✅ API测试成功: ${students.length} 个学生, 耗时 ${duration}ms`, 'success');
                log(`   - 响应状态: ${response.status}`, 'info');
                log(`   - 数据大小: ${text.length} 字节`, 'info');
                
                if (students.length > 0) {
                    log(`   - 第一个学生: ${students[0].name} (ID: ${students[0].id})`, 'info');
                    log(`   - 班级: ${students[0].class_name || '未设置'}`, 'info');
                }
                
            } catch (error) {
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                log(`❌ API测试失败: ${error.message}`, 'error');
                log(`   - 耗时: ${duration}ms`, 'error');
                log(`   - 错误类型: ${error.name}`, 'error');
            }
        }
        
        async function testLocalStorage() {
            log('开始测试 localStorage...', 'info');
            const startTime = performance.now();
            
            try {
                // 测试写入
                const testData = { test: 'data', timestamp: Date.now() };
                localStorage.setItem('test_key', JSON.stringify(testData));
                
                // 测试读取
                const retrieved = localStorage.getItem('test_key');
                const parsed = JSON.parse(retrieved);
                
                // 检查学生数据
                const studentsData = localStorage.getItem('students');
                const commentsData = localStorage.getItem('comments');
                
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                
                document.getElementById('localStorageTime').textContent = `${duration}ms`;
                
                log(`✅ localStorage测试成功, 耗时 ${duration}ms`, 'success');
                
                if (studentsData) {
                    const students = JSON.parse(studentsData);
                    log(`   - students缓存: ${students.length} 个学生`, 'success');
                    log(`   - 数据大小: ${studentsData.length} 字节`, 'info');
                } else {
                    log(`   - ⚠️ students缓存不存在`, 'warning');
                }
                
                if (commentsData) {
                    const comments = JSON.parse(commentsData);
                    log(`   - comments缓存: ${comments.length} 条评语`, 'success');
                } else {
                    log(`   - ⚠️ comments缓存不存在`, 'warning');
                }
                
                // 清理测试数据
                localStorage.removeItem('test_key');
                
            } catch (error) {
                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                log(`❌ localStorage测试失败: ${error.message}`, 'error');
                log(`   - 耗时: ${duration}ms`, 'error');
            }
        }
        
        async function testDataJS() {
            log('开始测试 data.js...', 'info');
            
            try {
                if (typeof window.dataService === 'undefined') {
                    log(`❌ window.dataService 未定义`, 'error');
                    log(`   - 请确保 data.js 已正确加载`, 'error');
                    return;
                }
                
                log(`✅ window.dataService 已定义`, 'success');
                
                // 测试 getStudents
                if (typeof window.dataService.getStudents === 'function') {
                    log(`✅ dataService.getStudents() 方法存在`, 'success');
                    
                    const startTime = performance.now();
                    const students = await window.dataService.getStudents();
                    const endTime = performance.now();
                    const duration = (endTime - startTime).toFixed(2);
                    
                    log(`✅ getStudents() 返回: ${students.length} 个学生, 耗时 ${duration}ms`, 'success');
                } else {
                    log(`❌ dataService.getStudents() 方法不存在`, 'error');
                }
                
                // 测试其他方法
                const methods = ['setStudents', 'getComments', 'saveComment', 'getExportSettings'];
                methods.forEach(method => {
                    if (typeof window.dataService[method] === 'function') {
                        log(`   - ✅ ${method}() 存在`, 'info');
                    } else {
                        log(`   - ❌ ${method}() 不存在`, 'warning');
                    }
                });
                
            } catch (error) {
                log(`❌ data.js测试失败: ${error.message}`, 'error');
            }
        }
        
        async function testFullLoad() {
            log('========================================', 'info');
            log('开始完整加载测试...', 'info');
            log('========================================', 'info');
            
            const totalStartTime = performance.now();
            
            // 步骤1: 检查 data.js
            log('步骤1: 检查 data.js', 'info');
            if (typeof window.dataService === 'undefined') {
                log('❌ data.js 未加载，无法继续', 'error');
                log('   - 请确保页面引用了 data.js', 'error');
                return;
            }
            log('✅ data.js 已加载', 'success');
            
            // 步骤2: 尝试从 localStorage 读取
            log('步骤2: 尝试从 localStorage 读取', 'info');
            const localStartTime = performance.now();
            let students = await window.dataService.getStudents();
            const localEndTime = performance.now();
            const localDuration = (localEndTime - localStartTime).toFixed(2);
            
            if (students && students.length > 0) {
                log(`✅ 从 localStorage 读取成功: ${students.length} 个学生, 耗时 ${localDuration}ms`, 'success');
                log('   - 🚀 这就是秒加载的关键！', 'success');
                document.getElementById('studentCount').textContent = students.length;
                document.getElementById('localStorageTime').textContent = `${localDuration}ms`;
                
                // 即使有缓存，也测试后台同步
                log('步骤3: 测试后台同步机制', 'info');
                setTimeout(async () => {
                    try {
                        const response = await fetch('/api/students', {
                            credentials: 'include'
                        });
                        
                        if (response.redirected) {
                            log('⚠️ 后台同步: API被重定向，可能需要重新登录', 'warning');
                            return;
                        }
                        
                        if (!response.ok) {
                            log(`⚠️ 后台同步失败: ${response.status}`, 'warning');
                            return;
                        }
                        
                        const text = await response.text();
                        if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                            log('⚠️ 后台同步: 返回HTML，可能需要重新登录', 'warning');
                            return;
                        }
                        
                        const data = JSON.parse(text);
                        const newStudents = data.students || [];
                        
                        // 比较数据是否有变化
                        const currentData = JSON.stringify(students);
                        const newData = JSON.stringify(newStudents);
                        
                        if (currentData !== newData) {
                            log(`✅ 后台同步: 检测到数据变化，已更新缓存`, 'success');
                            await window.dataService.setStudents(newStudents);
                        } else {
                            log(`✅ 后台同步: 数据无变化`, 'success');
                        }
                    } catch (error) {
                        log(`⚠️ 后台同步失败: ${error.message}`, 'warning');
                    }
                }, 100);
                
            } else {
                log(`⚠️ localStorage 无数据，需要从服务器获取`, 'warning');
                
                // 步骤3: 从服务器获取
                log('步骤3: 从服务器获取数据', 'info');
                const apiStartTime = performance.now();
                
                try {
                    const response = await fetch('/api/students', {
                        credentials: 'include'
                    });
                    const apiEndTime = performance.now();
                    const apiDuration = (apiEndTime - apiStartTime).toFixed(2);
                    
                    // 检查重定向
                    if (response.redirected) {
                        log(`❌ API被重定向到: ${response.url}`, 'error');
                        log(`   - 请先登录系统后再测试`, 'error');
                        return;
                    }
                    
                    if (!response.ok) {
                        log(`❌ 服务器响应错误: ${response.status}`, 'error');
                        return;
                    }
                    
                    const text = await response.text();
                    
                    // 检查是否返回HTML
                    if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                        log(`❌ API返回HTML而不是JSON`, 'error');
                        log(`   - 可能是登录页面，请先登录`, 'error');
                        return;
                    }
                    
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (parseError) {
                        log(`❌ JSON解析失败: ${parseError.message}`, 'error');
                        return;
                    }
                    
                    students = data.students || [];
                    
                    log(`✅ 从服务器获取成功: ${students.length} 个学生, 耗时 ${apiDuration}ms`, 'success');
                    document.getElementById('apiTime').textContent = `${apiDuration}ms`;
                    document.getElementById('studentCount').textContent = students.length;
                    
                    // 步骤4: 缓存到 localStorage
                    log('步骤4: 缓存到 localStorage', 'info');
                    await window.dataService.setStudents(students);
                    log('✅ 数据已缓存，下次将秒加载', 'success');
                    
                } catch (error) {
                    log(`❌ 从服务器获取失败: ${error.message}`, 'error');
                    return;
                }
            }
            
            const totalEndTime = performance.now();
            const totalDuration = (totalEndTime - totalStartTime).toFixed(2);
            document.getElementById('totalTime').textContent = `${totalDuration}ms`;
            
            log('========================================', 'info');
            log(`✅ 完整加载测试完成，总耗时 ${totalDuration}ms`, 'success');
            log('========================================', 'info');
            
            // 性能评估
            if (totalDuration < 100) {
                log('🚀 性能评级: 优秀 (秒加载)', 'success');
            } else if (totalDuration < 500) {
                log('✅ 性能评级: 良好', 'success');
            } else if (totalDuration < 1000) {
                log('⚠️ 性能评级: 一般', 'warning');
            } else {
                log('❌ 性能评级: 需要优化', 'error');
            }
        }
        
        // 页面加载时自动运行测试
        window.addEventListener('DOMContentLoaded', () => {
            log('诊断工具已加载', 'success');
            log('点击按钮开始测试', 'info');
        });
    </script>
    
    <!-- 加载 data.js 用于测试 -->
    <script src="/js/data.js"></script>
</body>
</html>
