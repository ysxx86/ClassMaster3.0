<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能成绩导入测试</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/boxicons-local.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .import-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .import-area:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }
        .import-area.drag-over {
            border-color: #28a745;
            background-color: #d4edda;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">智能成绩导入测试</h1>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">测试步骤</h5>
                <ol>
                    <li>点击"选择文件"按钮或拖放Excel文件</li>
                    <li>查看控制台日志</li>
                    <li>查看预览结果</li>
                    <li>点击"确认导入"按钮</li>
                </ol>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-body">
                <div class="mb-3">
                    <label for="importSemester" class="form-label">当前学期</label>
                    <input type="text" class="form-control" id="importSemester" value="2025-2026学年第一学期" readonly>
                </div>
                
                <div class="import-area">
                    <i class='bx bx-cloud-upload' style="font-size: 48px;"></i>
                    <h3>拖拽文件到此处或点击上传</h3>
                    <p>支持Excel文件格式 (.xlsx, .xls)</p>
                    <input type="file" id="gradeFile" class="d-none" accept=".xlsx, .xls">
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-primary me-2" onclick="document.getElementById('gradeFile').click()">
                            <i class='bx bx-upload'></i> 选择文件
                        </button>
                        <button class="btn btn-outline-secondary" id="downloadTemplateBtn">
                            <i class='bx bx-download'></i> 下载模板
                        </button>
                    </div>
                    <div class="mt-3 text-center" id="selectedFileName"></div>
                </div>
                
                <!-- 预览区域 -->
                <div id="previewArea" class="mt-4">
                    <div id="previewContent"></div>
                </div>
            </div>
            <div class="card-footer">
                <button type="button" class="btn btn-success" id="confirmImportGrades" disabled>确认导入</button>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-body">
                <h5 class="card-title">控制台日志</h5>
                <div id="consoleLog" style="background: #f8f9fa; padding: 15px; border-radius: 4px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                    等待操作...
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/libs/bootstrap.bundle.min.js"></script>
    <script src="/js/smart-grade-import.js"></script>
    <script>
        // 拦截console.log并显示在页面上
        const consoleLogDiv = document.getElementById('consoleLog');
        const originalLog = console.log;
        const originalError = console.error;
        
        function addLog(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : (type === 'warn' ? 'orange' : 'black');
            consoleLogDiv.innerHTML += `<div style="color: ${color};">[${timestamp}] ${message}</div>`;
            consoleLogDiv.scrollTop = consoleLogDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            console.log('开始初始化智能导入...');
            
            if (typeof initSmartGradeImport === 'function') {
                initSmartGradeImport();
                console.log('智能导入初始化成功');
            } else {
                console.error('未找到 initSmartGradeImport 函数');
            }
        });
        
        // 简单的通知函数
        function showNotification(message, type) {
            console.log(`[${type.toUpperCase()}] ${message}`);
            alert(`${type.toUpperCase()}: ${message}`);
        }
    </script>
</body>
</html>
