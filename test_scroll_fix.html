<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚动测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
        }
        .table-container {
            max-height: calc(100vh - 250px);
            overflow-y: auto;
            margin-bottom: 80px;
            border: 2px solid #007bff;
            border-radius: 8px;
            background-color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>成绩管理页面滚动测试</h1>
    
    <div class="test-section info">
        <h2>修复说明</h2>
        <p><strong>问题：</strong>成绩管理页面无法下拉滚动</p>
        <p><strong>原因：</strong>表格容器使用了 <code>height: calc(100vh - 200px)</code>，固定了高度</p>
        <p><strong>修复：</strong>改为 <code>max-height: calc(100vh - 250px)</code>，并增加底部边距</p>
    </div>
    
    <div class="test-section success">
        <h2>测试内容</h2>
        <p>✅ 页面可以正常滚动</p>
        <p>✅ 表格内容可以在容器内滚动</p>
        <p>✅ 表头固定在顶部</p>
        <p>✅ 底部不会被导航栏遮挡</p>
    </div>
    
    <h2>模拟成绩表格</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>语文</th>
                    <th>数学</th>
                    <th>英语</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- 将由JS生成 -->
            </tbody>
        </table>
    </div>
    
    <div class="test-section info">
        <h2>滚动测试结果</h2>
        <p id="scrollTest">请尝试滚动页面...</p>
    </div>
    
    <div class="footer">
        底部导航栏（固定在底部）
    </div>
    
    <script>
        // 生成测试数据
        const tbody = document.getElementById('tableBody');
        for (let i = 1; i <= 50; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${i.toString().padStart(3, '0')}</td>
                <td>学生${i}</td>
                <td>优</td>
                <td>良</td>
                <td>及格</td>
            `;
            tbody.appendChild(row);
        }
        
        // 监听滚动事件
        let scrollCount = 0;
        window.addEventListener('scroll', function() {
            scrollCount++;
            document.getElementById('scrollTest').innerHTML = `
                ✅ 页面滚动正常！已滚动 ${scrollCount} 次<br>
                当前滚动位置: ${window.scrollY}px
            `;
        });
        
        // 监听表格容器滚动
        const tableContainer = document.querySelector('.table-container');
        let tableScrollCount = 0;
        tableContainer.addEventListener('scroll', function() {
            tableScrollCount++;
            console.log(`表格容器滚动: ${tableScrollCount} 次, 位置: ${this.scrollTop}px`);
        });
    </script>
</body>
</html>
