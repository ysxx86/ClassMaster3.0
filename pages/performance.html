<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班主任绩效考核 - 德育AI智能系统</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/boxicons-local.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .container-fluid {
            padding: 20px;
        }
        
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .page-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        
        .page-header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        
        .nav-tabs {
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 30px;
        }
        
        .nav-tabs .nav-link {
            color: #666;
            border: none;
            padding: 12px 24px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .nav-tabs .nav-link:hover {
            color: #667eea;
            border-color: transparent;
        }
        
        .nav-tabs .nav-link.active {
            color: #667eea;
            background-color: transparent;
            border-bottom: 3px solid #667eea;
        }
        
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .card-header {
            background-color: #fff;
            border-bottom: 2px solid #f0f0f0;
            padding: 20px;
            font-weight: 600;
            font-size: 18px;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .table {
            margin-bottom: 0;
        }
        
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
            color: #495057;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .score-input {
            width: 80px;
            text-align: center;
        }
        
        .category-header {
            background-color: #f0f4ff;
            font-weight: 600;
            color: #667eea;
        }
        
        .rank-badge {
            font-size: 20px;
            padding: 8px 16px;
        }
        
        .rank-1 { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0 0%, #808080 100%); }
        .rank-3 { background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%); }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1><i class='bx bx-trophy'></i> 班主任绩效考核管理</h1>
            <p>科学评价，公平公正，促进班主任队伍建设</p>
        </div>
        
        <!-- 导航标签 -->
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="score-tab" data-bs-toggle="tab" data-bs-target="#score-panel" type="button">
                    <i class='bx bx-edit'></i> 评分录入
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="result-tab" data-bs-toggle="tab" data-bs-target="#result-panel" type="button">
                    <i class='bx bx-bar-chart-alt-2'></i> 考核结果
                </button>
            </li>
            <li class="nav-item" role="presentation" id="admin-tabs" style="display: none;">
                <button class="nav-link" id="item-tab" data-bs-toggle="tab" data-bs-target="#item-panel" type="button">
                    <i class='bx bx-list-ul'></i> 考核项目
                </button>
            </li>
            <li class="nav-item" role="presentation" id="admin-tabs2" style="display: none;">
                <button class="nav-link" id="evaluator-tab" data-bs-toggle="tab" data-bs-target="#evaluator-panel" type="button">
                    <i class='bx bx-user-check'></i> 评分人员
                </button>
            </li>
            <li class="nav-item" role="presentation" id="admin-tabs3" style="display: none;">
                <button class="nav-link" id="teacher-tab" data-bs-toggle="tab" data-bs-target="#teacher-panel" type="button">
                    <i class='bx bx-user'></i> 教师管理
                </button>
            </li>
        </ul>
        
        <!-- 标签内容 -->
        <div class="tab-content">
            <!-- 评分录入面板 -->
            <div class="tab-pane fade show active" id="score-panel">
                <div class="card">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <i class='bx bx-edit'></i> 评分录入
                                <small class="text-muted ms-2" id="auto-refresh-status">
                                    <i class='bx bx-refresh bx-spin'></i> 自动刷新中（每30秒）
                                </small>
                            </div>
                            <div class="col-md-6 text-end">
                                <select class="form-select d-inline-block w-auto me-2" id="score-semester">
                                    <option value="2024-2025-1">2024-2025学年第一学期</option>
                                    <option value="2024-2025-2">2024-2025学年第二学期</option>
                                    <option value="2025-2026-1">2025-2026学年第一学期</option>
                                </select>
                                <button class="btn btn-outline-primary btn-sm" id="refresh-btn" title="立即刷新数据">
                                    <i class='bx bx-refresh'></i> 刷新
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="score-content" class="loading">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 考核结果面板 -->
            <div class="tab-pane fade" id="result-panel">
                <div class="card">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <i class='bx bx-bar-chart-alt-2'></i> 考核结果
                            </div>
                            <div class="col-md-6 text-end">
                                <select class="form-select d-inline-block w-auto me-2" id="result-semester">
                                    <option value="2024-2025-1">2024-2025学年第一学期</option>
                                    <option value="2024-2025-2">2024-2025学年第二学期</option>
                                    <option value="2025-2026-1">2025-2026学年第一学期</option>
                                </select>
                                <button class="btn btn-primary" id="calculate-btn" style="display: none;">
                                    <i class='bx bx-calculator'></i> 计算结果
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="result-content" class="loading">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 考核项目面板（管理员） -->
            <div class="tab-pane fade" id="item-panel">
                <div class="card">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <i class='bx bx-list-ul'></i> 考核项目管理
                            </div>
                            <div class="col-md-6 text-end">
                                <button class="btn btn-primary" id="add-item-btn">
                                    <i class='bx bx-plus'></i> 添加项目
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="item-content" class="loading">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 评分人员面板（管理员） -->
            <div class="tab-pane fade" id="evaluator-panel">
                <div class="card">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <i class='bx bx-user-check'></i> 评分人员管理
                            </div>
                            <div class="col-md-6 text-end">
                                <button class="btn btn-primary" id="add-evaluator-btn">
                                    <i class='bx bx-plus'></i> 添加评分人员
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="evaluator-content" class="loading">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 教师管理面板（管理员） -->
            <div class="tab-pane fade" id="teacher-panel">
                <div class="card">
                    <div class="card-header">
                        <i class='bx bx-user'></i> 教师角色管理
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <i class='bx bx-info-circle'></i> 
                            <strong>角色说明：</strong>正班主任、副班主任、科任老师、行政、校级领导、超级管理员
                        </div>
                        <div id="teacher-content" class="loading">
                            <i class='bx bx-loader-alt bx-spin'></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/libs/bootstrap.bundle.min.js"></script>
    <script src="/js/libs/jquery.min.js"></script>
    <script src="/js/performance.js?v=20260117-2"></script>
</body>
</html>
